name: european-masters

services:
  em-db:
    image: docker.io/library/postgres:15-alpine
    container_name: em-db
    environment:
      - POSTGRES_DB=${DB_NAME:-masters_mailer}
      - POSTGRES_USER=${DB_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-bob123}
    volumes:
      # Esquema inicial de la BD (scripts en ./postgrest)
      - ./postgrest:/docker-entrypoint-initdb.d
      # Volumen persistente para los datos
      - em-db-data:/var/lib/postgresql/data
    networks:
      - kinForge-net

  em-backend:
    build:
      context: ./backend/cplaneta
      dockerfile: Dockerfile
    container_name: em-backend
    environment:
      # Datos de conexión a Postgres (dentro del cluster Docker)
      # IMPORTANTE: dentro de la red interna se usa el puerto del contenedor (5432), no el publicado (5435)
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL:-jdbc:postgresql://em-db:5432/masters_mailer}
      - DB_USERNAME=${DB_USERNAME_VARIABLE_GIT:-postgres}
      - DB_PASSWORD=${DB_PASSWORD_SECRET_GIT:-bob123}

          # Zona horaria JVM → Colombia
      - JAVA_OPTS=-Duser.timezone=America/Bogota

      # Config SMTP para AWS SES (Spring Mail)
      - MAIL_HOST=${MAIL_HOST_VARIABLE_GIT}
      - MAIL_PORT=${MAIL_PORT_VARIABLE_GIT}
      - MAIL_USERNAME=${MAIL_USER_SECRET_GIT}
      - MAIL_PASSWORD=${MAIL_PASS_SECRET_GIT}

      # Dirección de remitente verificada en SES
      - EMAIL_FROM=${EMAIL_FROM_VARIABLE_GIT:-andres.asesorias@kinforgeworks.com}
    depends_on:
      - em-db
    networks:
      - kinForge-net

  em-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: mi-astro-app:latest
    restart: unless-stopped
    networks:
      - kinForge-net

networks:
  kinForge-net:
    external: true # Importante: se conecta a la red que ya creó el Nginx Global

volumes:
  em-db-data:
