name: european-masters

services:
  em-db:
    image: docker.io/library/postgres:15-alpine
    container_name: em-db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=${DB_NAME:-masters_mailer}
      - POSTGRES_USER=${DB_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-bob123}
    volumes:
      # Esquema inicial de la BD (scripts en ./postgrest)
      - ./postgrest/schema.sql:/docker-entrypoint-initdb.d/init.sql:Z
      # Volumen persistente para los datos
      - em-db-data:/var/lib/postgresql/data
    networks:
      - kinForge-net

  em-redis:
    image: docker.io/library/redis:7-alpine
    container_name: em-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - kinForge-net
    # Sin puerto público — solo accesible dentro de la red interna

  em-backend:
    build:
      context: ./backend/cplaneta
      dockerfile: Dockerfile
    container_name: em-backend
    ports:
      - "8080:8080"
    environment:
      # Datos de conexión a Postgres (dentro del cluster Docker)
      # IMPORTANTE: dentro de la red interna se usa el puerto del contenedor (5432), no el publicado (5435)
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL:-jdbc:postgresql://em-db:5432/masters_mailer}
      - DB_USERNAME=${DB_USERNAME_VARIABLE_GIT:-postgres}
      - DB_PASSWORD=${DB_PASSWORD_SECRET_GIT:-bob123}

          # Zona horaria JVM → Colombia
      - JAVA_OPTS=-Duser.timezone=America/Bogota

      # Config SMTP para AWS SES (Spring Mail)
      - MAIL_HOST=${MAIL_HOST_VARIABLE_GIT}
      - MAIL_PORT=${MAIL_PORT_VARIABLE_GIT}
      - MAIL_USERNAME=${MAIL_USER_SECRET_GIT}
      - MAIL_PASSWORD=${MAIL_PASS_SECRET_GIT}

      # Dirección de remitente verificada en SES
      - EMAIL_FROM=${EMAIL_FROM_VARIABLE_GIT:-andres.asesorias@kinforgeworks.com}

      # variabke para el socket
      - PODMAN_API_URL=${PODMAN_HOST_SOCKET_GIT:-/run/user/1000/podman/podman.sock}

      # Nuevas variables
      - UPLOAD_DIR=/app/files/excel/
      - REDIS_HOST=em-redis
      - REDIS_PORT=6379
    volumes:
      - ${PODMAN_HOST_SOCKET_GIT:-/run/user/1000/podman/podman.sock}:${PODMAN_CONTAINER_SOCKET_GIT:-/run/user/1000/podman/podman.sock}
      - uploads_data:/app/files/excel/
    depends_on:
      - em-db
      - em-redis
    networks:
      - kinForge-net

  em-worker:
    build:
      context: ./worker                  # carpeta nueva con el ETL Python
      dockerfile: Dockerfile
    container_name: em-worker
    restart: "no"
    environment:
      - PYTHONUNBUFFERED=1
      - UPLOAD_DIR=/app/files/excel/
      - REDIS_HOST=em-redis
      - REDIS_PORT=6379
      - DB_HOST=em-db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-masters_mailer}
      - DB_USER=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-bob123}
    volumes:
      - uploads_data:/app/files/excel/       # ← mismo volumen, distinto mountpoint
    depends_on:
      - em-db
      - em-redis
    networks:
      - kinForge-net

  em-web:
    ports:
      - "4321:4321"
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: em-web
    image: mi-astro-app:latest
    restart: unless-stopped
    networks:
      - kinForge-net

  em-whatsapp-web:
    build:
      context: ./wwebjs-bot
      dockerfile: Dockerfile
    container_name: em-whatsapp-web
    ports:
      - "3000:3000"
    volumes:
      - ./.wwebjs_auth:/app/.wwebjs_auth
    restart: unless-stopped
    security_opt:
      - seccomp=unconfined
    networks:
      - kinForge-net

networks:
  kinForge-net:
    external: true # Importante: se conecta a la red que ya creó el Nginx Global

volumes:
  em-db-data:
  uploads_data:
