events { worker_connections 1024; }

http {
  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;
  client_header_buffer_size 16k;
  large_client_header_buffers 4 32k;

  # ─────────────────────────────────────────
  # SEGURIDAD GLOBAL
  # ─────────────────────────────────────────

  # No revelar versión de Nginx
  server_tokens off;

  # Rate limiting — zonas separadas por uso
  limit_req_zone $binary_remote_addr zone=global:10m rate=10r/s;
  limit_req_zone $binary_remote_addr zone=api:10m    rate=5r/s;

  # IPs bloqueadas
  geo $blocked_ip {
    default         0;
    65.2.69.132     1;   # Bot AWS Mumbai
  }

  # ─────────────────────────────────────────
  # SERVER DEFAULT — captura cualquier dominio
  # no reconocido y lo cierra sin respuesta
  # ─────────────────────────────────────────
  server {
    listen 80  default_server;
    listen 443 default_server ssl;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/n8n.kinforgeworks.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n8n.kinforgeworks.com/privkey.pem;

    return 444;
  }

  # ─────────────────────────────────────────
  # N8N
  # ─────────────────────────────────────────

  # HTTP → HTTPS
  server {
    listen 80;
    server_name n8n.kinforgeworks.com;

    # Bloquear IPs maliciosas
    if ($blocked_ip) { return 403; }

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }
    location / {
      return 301 https://$host$request_uri;
    }
  }

  # HTTPS → proxy a n8n
  server {
    listen 443 ssl;
    server_name n8n.kinforgeworks.com;

    ssl_certificate     /etc/letsencrypt/live/n8n.kinforgeworks.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n8n.kinforgeworks.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Bloquear IPs maliciosas
    if ($blocked_ip) { return 403; }

    # Rate limiting
    limit_req zone=global burst=30 nodelay;

    # Bloquear rutas comunes de scanners
    location ~* /(wp-admin|wp-login|wp-config|xmlrpc\.php|\.env|\.git) {
      return 444;
    }

    # Headers de seguridad
    add_header X-Frame-Options "SAMEORIGIN"        always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header Referrer-Policy "no-referrer"       always;

    location / {
      proxy_pass http://n8n:5678;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_hide_header X-Powered-By;

      # Websockets
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }

  ########################################################################
  # European Masters: landing + backend
  ########################################################################

  # HTTP → HTTPS
  server {
    listen 80;
    server_name european-masters-web.kinforgeworks.com;

    # Bloquear IPs maliciosas
    if ($blocked_ip) { return 403; }

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }
    location / {
      return 301 https://$host$request_uri;
    }
  }

  # HTTPS → Frontend + Backend bajo mismo dominio
  server {
    listen 443 ssl;
    server_name european-masters-web.kinforgeworks.com;

    ssl_certificate     /etc/letsencrypt/live/european-masters-web.kinforgeworks.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/european-masters-web.kinforgeworks.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Bloquear IPs maliciosas
    if ($blocked_ip) { return 403; }

    # Rate limiting general
    limit_req zone=global burst=50 nodelay;

    # Bloquear rutas de scanners
    location ~* /(wp-admin|wp-login|wp-config|xmlrpc\.php|\.env|\.git) {
      return 444;
    }

    # Headers de seguridad
    add_header X-Frame-Options "SAMEORIGIN"        always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header Referrer-Policy "no-referrer"       always;
    add_header X-XSS-Protection "1; mode=block"   always;

    # Backend — rate limiting más estricto en /api
    location /api/ {
      limit_req zone=api burst=20 nodelay;

      proxy_pass http://em-backend:8080;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_hide_header X-Powered-By;
    }

    # Frontend Astro
    location / {
      auth_basic "Acceso restringido";
      auth_basic_user_file /etc/nginx/.htpasswd;

      proxy_pass http://em-web:80;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}