events { worker_connections 1024; }

http {
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # Rutas para el challenge de Let's Encrypt
    server {
        listen 80;
        server_name kinforgeworks.com www.kinforgeworks.com european_masters.kinforgeworks.com n8n.kinforgeworks.com atalay.kinforgeworks.com;
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 404;
        }
    }

    # --- Proyecto: European Masters ---
    server {
        listen 80;
        server_name european-masters.kinforgeworks.com;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- Proyecto: Atalay ---
    server {
        listen 80;
        server_name atalay.kinforgeworks.com;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- Dominio Principal (Opcional pero recomendado) ---
    server {
        listen 80;
        server_name kinforgeworks.com www.kinforgeworks.com;

        location / {
            return 301 https://$host$request_uri;
        }
    }
    
    # --- Proyecto: N8N ---
    server {
        listen 80;
        server_name n8n.kinforgeworks.com;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- HTTPS: Dominio principal ---
    server {
        listen 443 ssl;
        server_name kinforgeworks.com www.kinforgeworks.com;

        ssl_certificate     /etc/letsencrypt/live/kinforgeworks.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/kinforgeworks.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            return 200 'Servidor Activo - Kinforge Works (HTTPS)';
        }
    }

    # --- HTTPS: European Masters ---
    server {
        listen 443 ssl;
        server_name european-masters.kinforgeworks.com;

        ssl_certificate     /etc/letsencrypt/live/kinforgeworks.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/kinforgeworks.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://em-landing:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # --- HTTPS: Atalay ---
    server {
        listen 443 ssl;
        server_name atalay.kinforgeworks.com;

        ssl_certificate     /etc/letsencrypt/live/kinforgeworks.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/kinforgeworks.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://atalay-app:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # --- HTTPS: N8N ---
    server {
        listen 443 ssl;
        server_name n8n.kinforgeworks.com;

        ssl_certificate     /etc/letsencrypt/live/kinforgeworks.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/kinforgeworks.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://n8n:5678;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}