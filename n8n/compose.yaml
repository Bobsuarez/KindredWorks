name: n8n-stack

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=tuUsuario
      - N8N_BASIC_AUTH_PASSWORD=tuPassword
      - N8N_HOST=n8n.kinforgeworks.com
      - N8N_PORT=5678
    ports:
       - "5678:5678"
    networks:
      - kinForge-net

networks:
  kinForge-net:
    external: true