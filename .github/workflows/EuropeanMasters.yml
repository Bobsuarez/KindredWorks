name: Deploy Componentes Específicos

on:
  push:
    branches:
      - master
    # AQUÍ ESTÁ EL TRUCO: Solo se activa si cambias archivos en estas carpetas
    paths:
      - 'european-masters/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Desplegar en Contabo vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/bob/projects/KindredWorks/european-masters
            git pull origin master
            
            # Usando la filosofía de Podman Pods que hablamos:
            # Reconstruimos solo los componentes necesarios
            # podman build -t img-ventas ./app-ventas
            # podman build -t img-stock ./app-stock
            
            # Si usas un archivo kube YAML para el Pod:
            # podman play kube despliegue-dual.yaml --replace
