name: Deploy Componentes Específicos

on:
  push:
    branches:
      - master
    # AQUÍ ESTÁ EL TRUCO: Solo se activa si cambias archivos en estas carpetas
    paths:
      - 'european-masters/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment: works
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
 
      - name: Debug
        run: echo "MAIL_HOST=${{ vars.MAIL_HOST }}"

      - name: Desplegar en Contabo vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/bob/projects/KindredWorks/
            git pull origin master
            cd european-masters

            # Pasamos los secrets de GitHub como variables de entorno al comando
            export MAIL_HOST_VARIABLE_GIT=${{ vars.MAIL_HOST }}
            export MAIL_PORT_VARIABLE_GIT=${{ vars.MAIL_PORT }}
            export MAIL_USER_SECRET_GIT=${{ secrets.MAIL_USER }}
            export MAIL_PASS_SECRET_GIT=${{ secrets.MAIL_PASS }}
            export PODMAN_HOST_SOCKET_GIT=${{ secrets.PODMAN_HOST_SOCKET }}
            export PODMAN_CONTAINER_SOCKET_GIT=${{ secrets.PODMAN_CONTAINER_SOCKET }}
            
            # Forzamos la reconstrucción si cambiaste el código Java
            # y levantamos en segundo plano (-d)
            podman-compose build --no-cache
            podman-compose up -d em-db em-redis em-backend em-web em-whatsapp-web
            podman-compose up --no-start em-worker
            
            # Limpieza de imágenes huérfanas para ahorrar espacio en Contabo
            podman image prune -f

            podman restart nginx-proxy
